<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA – Разписание</title>
<link rel="manifest" href="manifest.json">

<style>
body{font-family:Arial;margin:0;background:#f5f0ea}
header{display:flex;justify-content:center;align-items:center;padding:10px;background:#3b3631;color:#fff;font-size:18px;gap:10px}
#calendar{font-size:24px;text-align:center;padding:6px}
.container{padding:12px}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.slot{border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.slot.free{background:#eaffea}
.slot.booked{background:#f44336;color:#fff}
.slot.paid{background:#4caf50;color:#fff}
.slot.packagePaid{background:#ff9800;color:#fff}
button{padding:6px;margin-left:4px;border:none;border-radius:4px;background:#333;color:#fff}
#form{background:#fff;padding:12px;border-radius:8px;margin-bottom:12px}
select,input{padding:6px;margin-bottom:6px}
#save{padding:12px;font-size:20px;width:100%}
</style>
</head>

<body>

<header>
<button id="prev">◀</button>
<input type="date" id="calendar">
<button id="next">▶</button>
</header>

<div class="container">
<div id="form">
<h3>Нов масаж</h3>
<input id="name" placeholder="Име">

<select id="duration">
<option value="30">30 мин</option>
<option value="60">60 мин</option>
</select>

<select id="packageSelect">
<option value="">Единичен</option>
<option value="5">Пакет 5</option>
<option value="10">Пакет 10</option>
</select>

<select id="time"></select>
<button id="save">Запази</button>
</div>

<div class="slots" id="slots"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDhglQG4GWGN8qHwkkolZsEuZN9o6g9fKg",
  authDomain: "aura-schedule.firebaseapp.com",
  projectId: "aura-schedule"
});
const db=firebase.firestore();
</script>

<script>
const fmt=d=>d.toISOString().split('T')[0]
let current=new Date()
calendar.value=fmt(current)

prev.onclick=()=>{current.setDate(current.getDate()-1);calendar.value=fmt(current);render()}
next.onclick=()=>{current.setDate(current.getDate()+1);calendar.value=fmt(current);render()}
calendar.onchange=()=>{current=new Date(calendar.value);render()}

const times=[]
for(let h=9;h<19;h++){
 times.push(`${String(h).padStart(2,'0')}:00`)
 times.push(`${String(h).padStart(2,'0')}:30`)
}
times.forEach(t=>{
 const o=document.createElement('option')
 o.value=o.textContent=t
 time.appendChild(o)
})

const loadDay=async()=> {
 const s=await db.collection('schedule').doc(fmt(current)).get()
 return s.exists?s.data():{}
}
const saveDay=async d=>db.collection('schedule').doc(fmt(current)).set(d)

const loadClient=async name=>{
 const s=await db.collection('clients').doc(name).get()
 return s.exists?s.data():{packages:[]}
}
const saveClient=(name,d)=>db.collection('clients').doc(name).set(d)

// 🔑 пакет логика
const getActivePackage=c=>c.packages.find(p=>p.active)
const newPackage=total=>({total,used:0,active:true})

// SAVE
save.onclick=async()=>{
 if(!name.value||!time.value)return

 const day=await loadDay()
 if(day[time.value])return

 let client=await loadClient(name.value)
 let pkgSize=+packageSelect.value||0
 let pkg=getActivePackage(client)

 if(pkgSize){
  if(!pkg){
   pkg=newPackage(pkgSize)
   client.packages.push(pkg)
  }
  pkg.used++
  if(pkg.used>=pkg.total) pkg.active=false
 }

 const label=pkg?`${pkg.used}/${pkg.total}`:''
 const slot={name:name.value,duration:+duration.value,paid:false,package:!!pkg,label}

 day[time.value]=slot

 if(duration.value==60){
  const i=times.indexOf(time.value)
  if(times[i+1]) day[times[i+1]]={...slot}
 }

 await saveClient(name.value,client)
 await saveDay(day)
 name.value=''
 packageSelect.value=''
 render()
}

// ПЛАТЕН → маркира ВСИЧКИ от пакета
async function markPaid(time){
 const day=await loadDay()
 const name=day[time].name
 Object.values(day).forEach(s=>{
  if(s.name===name) s.paid=true
 })
 await saveDay(day)
 render()
}

async function deleteMassage(t){
 const d=await loadDay()
 delete d[t]
 await saveDay(d)
 render()
}

async function render(){
 slots.innerHTML=''
 const day=await loadDay()
 const hidden=new Set()

 times.forEach(t=>{
  if(hidden.has(t))return
  const b=day[t]
  const d=document.createElement('div')

  if(!b)d.className='slot free'
  else if(b.paid)d.className=b.package?'slot packagePaid':'slot paid'
  else d.className='slot booked'

  if(b&&b.duration==60){
   const i=times.indexOf(t)
   if(times[i+1])hidden.add(times[i+1])
  }

  d.innerHTML=`
   <div><b>${t}</b>${b?`<div>${b.name}${b.package?` (${b.label})`:''}</div>`:''}</div>
   <span>${b?'Заето':'Свободно'}</span>
  `

  if(b){
   d.onclick=()=>{
    d.innerHTML+=`
     <div>
      ${!b.paid?`<button onclick="event.stopPropagation();markPaid('${t}')">Платен</button>`:''}
      <button onclick="event.stopPropagation();deleteMassage('${t}')">Изтрий</button>
     </div>`
   }
  }
  slots.appendChild(d)
 })
}

render()
</script>
</body>
</html>
