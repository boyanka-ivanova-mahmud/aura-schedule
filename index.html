<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>AURA – Разписание</title>

<style>
body{font-family:Arial;margin:0;background:#f5f0ea}
header{display:flex;justify-content:center;align-items:center;padding:10px;background:#3b3631;color:#fff;font-size:18px;gap:10px}
#calendar{font-size:24px;text-align:center;padding:6px}
.container{padding:12px}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.slot{border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.slot.free{background:#eaffea}
.slot.booked{background:#f44336;color:#fff}
.slot.paid{background:#4caf50;color:#fff}
.slot.packagePaid{background:#ff9800;color:#fff}
button{padding:6px;border:none;border-radius:4px;background:#333;color:#fff;cursor:pointer}
#form{background:#fff;padding:12px;border-radius:8px;margin-bottom:12px}
select,input{padding:6px;margin-bottom:6px}
#save{padding:12px;font-size:18px}
</style>
</head>

<body>

<header>
<button id="prev">◀</button>
<input type="date" id="calendar">
<button id="next">▶</button>
</header>

<div class="container">

<div id="form">
<h3>Нов масаж</h3>
<input id="name" placeholder="Име">

<select id="duration">
<option value="30">30 мин</option>
<option value="60">60 мин</option>
</select>

<select id="packageSelect">
<option value="">Единичен</option>
<option value="5">Пакет 5</option>
<option value="10">Пакет 10</option>
</select>

<select id="time"></select>

<button id="save">Запази</button>
</div>

<div class="slots" id="slots"></div>

</div>

<script>
// ================== DATE ==================
let current=new Date()
const fmt=d=>d.toISOString().split('T')[0]
calendar.value=fmt(current)
prev.onclick=()=>{current.setDate(current.getDate()-1);calendar.value=fmt(current);render()}
next.onclick=()=>{current.setDate(current.getDate()+1);calendar.value=fmt(current);render()}
calendar.onchange=()=>{current=new Date(calendar.value);render()}

// ================== TIMES ==================
const times=[]
for(let h=9;h<19;h++){
 times.push(`${String(h).padStart(2,'0')}:00`)
 times.push(`${String(h).padStart(2,'0')}:30`)
}
times.forEach(t=>{
 const o=document.createElement('option')
 o.value=o.textContent=t
 time.appendChild(o)
})

// ================== STORAGE ==================
const load=k=>JSON.parse(localStorage.getItem(k)||'{}')
const saveData=(k,v)=>localStorage.setItem(k,JSON.stringify(v))

// ================== PACKAGE LOGIC ==================
function createNewPackage(total){
 return{
  id:"pkg_"+Date.now(),
  total,
  used:0,
  active:true
 }
}
function getActivePackage(client){
 return client.packages.find(p=>p.active)
}
function closePackage(pkg){
 pkg.active=false
}

// ================== SAVE ==================
save.onclick=()=>{
 if(!name.value||!time.value)return alert("Липсват данни")

 const date=fmt(current)
 const schedule=load("schedule")
 schedule[date]=schedule[date]||{}

 if(schedule[date][time.value])return alert("Часът е зает")

 const clients=load("clients")
 let client=clients[name.value]||{name:name.value,packages:[]}

 let activePkg=getActivePackage(client)
 const pkgSize=+packageSelect.value||0

 if(!activePkg && pkgSize){
  activePkg=createNewPackage(pkgSize)
  client.packages.push(activePkg)
 }

 let label=""
 if(activePkg){
  activePkg.used++
  label=`${activePkg.used}/${activePkg.total}`
  if(activePkg.used>=activePkg.total)closePackage(activePkg)
 }

 schedule[date][time.value]={
  name:client.name,
  duration:+duration.value,
  paid:false,
  package:!!activePkg,
  label
 }

 if(duration.value==60){
  const idx=times.indexOf(time.value)
  const nextTime=times[idx+1]
  if(nextTime)schedule[date][nextTime]={...schedule[date][time.value]}
 }

 clients[client.name]=client
 saveData("schedule",schedule)
 saveData("clients",clients)

 name.value=""
 packageSelect.value=""
 render()
}

// ================== RENDER ==================
function render(){
 slots.innerHTML=""
 const day=load("schedule")[fmt(current)]||{}
 const hidden=new Set()

 times.forEach(t=>{
  if(hidden.has(t))return
  const b=day[t]
  const d=document.createElement("div")

  if(!b)d.className="slot free"
  else if(b.paid)d.className=b.package?"slot packagePaid":"slot paid"
  else d.className="slot booked"

  if(b&&b.duration==60){
   const i=times.indexOf(t)
   if(times[i+1])hidden.add(times[i+1])
  }

  d.innerHTML=`
   <div>
    <b>${t}</b>
    ${b?`<div>${b.name}${b.package?` (${b.label})`:''}</div>`:''}
   </div>
   <span>${b?'Заето':'Свободно'}</span>
  `
  slots.appendChild(d)
 })
}

render()
</script>
</body>
</html>
