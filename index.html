<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA – Разписание</title>

<style>
body{font-family:Arial;margin:0;background:#f5f0ea}
header{display:flex;justify-content:center;align-items:center;padding:10px;background:#3b3631;color:#fff;font-size:18px;gap:10px}
#calendar{font-size:24px;text-align:center;padding:6px}
.container{padding:12px}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.slot{border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:16px}
.slot.free{background:#eaffea}
.slot.booked{background:#f44336;color:#fff}
.slot.paid{background:#4caf50;color:#fff}
button{padding:6px;border:none;border-radius:4px;background:#333;color:#fff}
#form{background:#fff;padding:12px;border-radius:8px;margin-bottom:12px}
#save{padding:12px;font-size:20px;width:100%}
</style>
</head>

<body>

<header>
  <button id="prev">◀</button>
  <input type="date" id="calendar">
  <button id="next">▶</button>
</header>

<div class="container">

  <div id="form">
    <h3>Нов масаж</h3>
    <input id="name" placeholder="Име">
    <select id="time"></select>
    <button id="save">Запази</button>
  </div>

  <div class="slots" id="slots"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDhglQG4GWGN8qHwkkolZsEuZN9o6g9fKg",
  authDomain: "aura-schedule.firebaseapp.com",
  projectId: "aura-schedule"
});
const db = firebase.firestore();
</script>

<script>
// ELEMENTS
const nameInput = document.getElementById('name')
const timeSelect = document.getElementById('time')
const calendar = document.getElementById('calendar')
const slotsDiv = document.getElementById('slots')

// DATE
let current = new Date()
const fmt = d => d.toISOString().split('T')[0]
calendar.value = fmt(current)
calendar.onchange = () => { current = new Date(calendar.value); render() }
document.getElementById('prev').onclick = () => { current.setDate(current.getDate()-1); calendar.value=fmt(current); render() }
document.getElementById('next').onclick = () => { current.setDate(current.getDate()+1); calendar.value=fmt(current); render() }

// TIMES
const times=[]
for(let h=9;h<19;h++){
  times.push(`${String(h).padStart(2,'0')}:00`)
  times.push(`${String(h).padStart(2,'0')}:30`)
}
times.forEach(t=>{
  const o=document.createElement('option')
  o.value=o.textContent=t
  timeSelect.appendChild(o)
})

// FIRESTORE HELPERS
async function loadDay(){
  const snap = await db.collection('schedule').doc(fmt(current)).get()
  return snap.exists ? snap.data() : {}
}
async function saveDay(data){
  await db.collection('schedule').doc(fmt(current)).set(data)
}

// SAVE
document.getElementById('save').onclick = async ()=>{
  if(!nameInput.value || !timeSelect.value) return

  const day = await loadDay()
  const t = timeSelect.value
  if(day[t]) return alert('Часът е зает')

  day[t] = {
    name: nameInput.value,
    paid: false
  }

  await saveDay(day)
  nameInput.value = ''
  render()
}

// MARK PAID
async function markPaid(time){
  const day = await loadDay()
  day[time].paid = true
  await saveDay(day)
  render()
}

// DELETE
async function deleteMassage(time){
  const day = await loadDay()
  delete day[time]
  await saveDay(day)
  render()
}

// RENDER
async function render(){
  slotsDiv.innerHTML = ''
  const day = await loadDay()

  times.forEach(t=>{
    const b = day[t]
    const d = document.createElement('div')

    if(!b) d.className='slot free'
    else if(b.paid) d.className='slot paid'
    else d.className='slot booked'

    d.innerHTML = `
      <div><b>${t}</b>${b?`<div>${b.name}</div>`:''}</div>
      <span>${b?'Заето':'Свободно'}</span>
    `

    if(b){
      d.onclick = ()=>{
        d.innerHTML += `
          <div>
            ${!b.paid?`<button onclick="event.stopPropagation();markPaid('${t}')">Платен</button>`:''}
            <button onclick="event.stopPropagation();deleteMassage('${t}')">Изтрий</button>
          </div>
        `
      }
    }

    slotsDiv.appendChild(d)
  })
}

render()
</script>
</body>
</html>
