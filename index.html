<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA – Разписание</title>

<style>
body{font-family:Arial;margin:0;background:#f5f0ea}
header{display:flex;justify-content:center;align-items:center;padding:10px;background:#3b3631;color:#fff;gap:10px}
#calendar{font-size:22px;padding:6px}
.container{padding:12px}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.slot{border-radius:8px;padding:12px;display:flex;justify-content:space-between;cursor:pointer}
.free{background:#eaffea}
.booked{background:#f44336;color:#fff}
#form{background:#fff;padding:12px;border-radius:8px;margin-bottom:12px}
button{padding:6px;border:none;border-radius:4px;background:#333;color:#fff}
select,input{padding:6px;margin-bottom:6px}
</style>
</head>

<body>

<header>
<button id="prev">◀</button>
<input type="date" id="calendar">
<button id="next">▶</button>
</header>

<div class="container">

<div id="form">
<h3>Нов масаж</h3>

<input id="name" placeholder="Име"><br>

<select id="duration">
<option value="30">30 мин</option>
<option value="60">60 мин</option>
</select><br>

<select id="packageSelect">
<option value="">Единичен</option>
<option value="5">Пакет 5</option>
<option value="10">Пакет 10</option>
</select><br>

<select id="time"></select><br>
<button id="save">Запази</button>
</div>

<div class="slots" id="slots"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDhglQG4GWGN8qHwkkolZsEuZN9o6g9fKg",
  authDomain: "aura-schedule.firebaseapp.com",
  projectId: "aura-schedule",
  storageBucket: "aura-schedule.firebasestorage.app",
  messagingSenderId: "1061955157940",
  appId: "1:1061955157940:web:7009801b6a5db594ccfce1"
});
const db = firebase.firestore();
</script>

<script>
// ===== DATE =====
let current=new Date()
const fmt=d=>d.toISOString().split('T')[0]
calendar.value=fmt(current)
prev.onclick=()=>{current.setDate(current.getDate()-1);calendar.value=fmt(current);render()}
next.onclick=()=>{current.setDate(current.getDate()+1);calendar.value=fmt(current);render()}
calendar.onchange=()=>{current=new Date(calendar.value);render()}

// ===== TIMES =====
const times=[]
for(let h=9;h<19;h++){
 times.push(`${String(h).padStart(2,'0')}:00`)
 times.push(`${String(h).padStart(2,'0')}:30`)
}
times.forEach(t=>{
 const o=document.createElement('option')
 o.value=o.textContent=t
 time.appendChild(o)
})

// ===== FIRESTORE HELPERS =====
async function loadSchedule(){
 const snap = await db.collection('schedule').get()
 const data={}
 snap.forEach(doc=>data[doc.id]=doc.data())
 return data
}

async function loadDay(date){
 const doc = await db.collection('schedule').doc(date).get()
 return doc.exists ? doc.data() : {}
}

async function saveDay(date,data){
 await db.collection('schedule').doc(date).set(data)
}

// ===== PACKAGE COUNT =====
async function countPackageMassages(name, packageTotal){
 const schedule = await loadSchedule()
 let count = 0

 for(const date in schedule){
  for(const time in schedule[date]){
   const s = schedule[date][time]
   if(s.name===name && s.package===packageTotal){
    if(s.duration==30 || time.endsWith(':00')){
     count++
    }
   }
  }
 }
 return count
}

// ===== SAVE =====
save.onclick=async()=>{
 if(!name.value||!time.value)return

 const date=fmt(current)
 const day=await loadDay(date)
 if(day[time.value])return

 const packageTotal=+packageSelect.value||0
 let slotNumber=0

 if(packageTotal){
  slotNumber = await countPackageMassages(name.value,packageTotal) + 1
 }

 const slot={
  name:name.value,
  duration:+duration.value,
  package:packageTotal,
  slotNumber,
  packageTotal
 }

 day[time.value]=slot

 if(duration.value==60){
  const i=times.indexOf(time.value)
  if(times[i+1]) day[times[i+1]]={...slot}
 }

 await saveDay(date,day)
 name.value=''
 packageSelect.value=''
 render()
}

// ===== DELETE =====
async function deleteMassage(date,time){
 const day=await loadDay(date)
 if(day[time]) delete day[time]
 await saveDay(date,day)
 render()
}

// ===== RENDER =====
async function render(){
 slots.innerHTML=''
 const day=await loadDay(fmt(current))
 const hidden=new Set()

 times.forEach(t=>{
  if(hidden.has(t))return
  const b=day[t]
  const d=document.createElement('div')

  d.className='slot '+(b?'booked':'free')

  if(b&&b.duration==60){
   const i=times.indexOf(t)
   if(times[i+1]) hidden.add(times[i+1])
  }

  d.innerHTML=`
   <div>
    <b>${t}</b>
    ${b?`<div>${b.name}${b.package?` (${b.slotNumber}/${b.packageTotal})`:''}</div>`:''}
   </div>
   <span>${b?'Заето':'Свободно'}</span>
  `

  if(b){
   d.onclick=()=>{
    d.innerHTML+=`
     <button onclick="event.stopPropagation();deleteMassage('${fmt(current)}','${t}')">
      Изтрий
     </button>
    `
   }
  }

  slots.appendChild(d)
 })
}

render()
</script>

</body>
</html>
