<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA – Разписание</title>

<style>
body{font-family:Arial;margin:0;background:#f5f0ea}
header{display:flex;justify-content:center;align-items:center;padding:10px;background:#3b3631;color:#fff;gap:10px}
#calendar{font-size:22px;padding:6px}
.container{padding:12px}
.slot{padding:12px;border-radius:8px;display:flex;justify-content:space-between;cursor:pointer;margin-bottom:6px}
.free{background:#eaffea}
.booked{background:#f44336;color:#fff}
.paid{background:#ff9800;color:#fff}
#form{background:#fff;padding:12px;border-radius:8px;margin-bottom:12px}
button{padding:6px;border:none;border-radius:4px;background:#333;color:#fff;margin-left:4px}
</style>
</head>

<body>

<header>
<button id="prev">◀</button>
<input type="date" id="calendar">
<button id="next">▶</button>
</header>

<div class="container">

<div id="form">
<h3>Нов масаж</h3>

<input id="name" placeholder="Име"><br><br>

<select id="duration">
<option value="30">30 мин</option>
<option value="60">60 мин</option>
</select><br><br>

<select id="package">
<option value="">Единичен</option>
<option value="5">Пакет 5</option>
<option value="10">Пакет 10</option>
</select><br><br>

<select id="time"></select><br><br>

<button id="save">Запази</button>
</div>

<div id="slots"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDhglQG4GWGN8qHwkkolZsEuZN9o6g9fKg",
  authDomain: "aura-schedule.firebaseapp.com",
  projectId: "aura-schedule",
  storageBucket: "aura-schedule.firebasestorage.app",
  messagingSenderId: "1061955157940",
  appId: "1:1061955157940:web:7009801b6a5db594ccfce1"
});
const db = firebase.firestore();
</script>

<script>
// ===== DATE =====
let current=new Date()
const fmt=d=>d.toISOString().split('T')[0]
calendar.value=fmt(current)
prev.onclick=()=>{current.setDate(current.getDate()-1);calendar.value=fmt(current);render()}
next.onclick=()=>{current.setDate(current.getDate()+1);calendar.value=fmt(current);render()}
calendar.onchange=()=>{current=new Date(calendar.value);render()}

// ===== TIMES =====
const times=[]
for(let h=9;h<19;h++){
 times.push(`${String(h).padStart(2,'0')}:00`)
 times.push(`${String(h).padStart(2,'0')}:30`)
}
times.forEach(t=>{
 const o=document.createElement('option')
 o.value=o.textContent=t
 time.appendChild(o)
})

// ===== DB HELPERS =====
const loadDay=async()=>{
 const s=await db.collection('days').doc(fmt(current)).get()
 return s.exists?s.data():{}
}
const saveDay=d=>db.collection('days').doc(fmt(current)).set(d)

const loadClient=async n=>{
 const s=await db.collection('clients').doc(n).get()
 return s.exists?s.data():{}
}
const saveClient=(n,d)=>db.collection('clients').doc(n).set(d)

// ===== SAVE =====
save.onclick=async()=>{
 if(!name.value||!time.value)return

 const day=await loadDay()
 if(day[time.value])return

 let client=await loadClient(name.value)
 if(!client.activePackage && package.value){
   client.activePackage={total:+package.value,used:0,paid:false}
 }

 let pkg=client.activePackage
 let label=''

 if(pkg){
   pkg.used++
   if(pkg.used>pkg.total){
     pkg={total:pkg.total,used:1,paid:false}
   }
   client.activePackage=pkg
   label=`${pkg.used}/${pkg.total}`
 }

 day[time.value]={
  name:name.value,
  duration:+duration.value,
  paid:pkg?pkg.paid:false,
  label
 }

 if(duration.value==60){
  const i=times.indexOf(time.value)
  if(times[i+1]) day[times[i+1]]={...day[time.value]}
 }

 await saveClient(name.value,client)
 await saveDay(day)
 name.value=''
 package.value=''
 render()
}

// ===== RENDER =====
async function render(){
 slots.innerHTML=''
 const day=await loadDay()
 const hidden=new Set()

 times.forEach(t=>{
  if(hidden.has(t))return
  const b=day[t]
  const d=document.createElement('div')

  if(!b)d.className='slot free'
  else if(b.paid)d.className='slot paid'
  else d.className='slot booked'

  if(b&&b.duration==60){
   const i=times.indexOf(t)
   if(times[i+1])hidden.add(times[i+1])
  }

  d.innerHTML=`
   <div><b>${t}</b> ${b?`${b.name} ${b.label}`:'Свободно'}</div>
   ${b?'<button onclick="payPackage(\''+b.name+'\')">Платен</button>':''}
  `
  slots.appendChild(d)
 })
}

// ===== PAY PACKAGE =====
async function payPackage(name){
 const client=await loadClient(name)
 if(!client.activePackage)return
 client.activePackage.paid=true
 await saveClient(name,client)

 const snap=await db.collection('days').get()
 snap.forEach(doc=>{
  const d=doc.data()
  Object.keys(d).forEach(t=>{
   if(d[t].name===name)d[t].paid=true
  })
  db.collection('days').doc(doc.id).set(d)
 })
 render()
}

render()
</script>

</body>
</html>
